services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: popkorn:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      # Set to your public domain in production, e.g. https://popkorn.example.com
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:3001}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
